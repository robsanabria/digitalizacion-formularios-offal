<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .box { fill:#f3f4f6; stroke:#333; stroke-width:1px; rx:6; }
    .actor { fill:#fff3bf; stroke:#b45309; stroke-width:1px; rx:6; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size:14px; fill:#111827; }
    .title { font-family: Arial, Helvetica, sans-serif; font-size:18px; font-weight:600; }
    .note { font-family: Arial, Helvetica, sans-serif; font-size:12px; fill:#374151; }
    .arrow { stroke:#333; stroke-width:1.5; fill:none; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <text x="20" y="28" class="title">Diagrama REG-SIS-007 — Base de datos y casos de uso</text>

  <!-- Actors -->
  <g transform="translate(20,60)">
    <rect class="actor" x="0" y="0" width="200" height="48" />
    <text x="12" y="30" class="label">Solicitante / Calidad</text>

    <rect class="actor" x="0" y="72" width="160" height="48" />
