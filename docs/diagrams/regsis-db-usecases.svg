  <path class="arrow" d="M360 104 L400 104" />
  <text x="384" y="96" class="note">tiene adjuntos</text>

  <path class="arrow" d="M240 104 L300 104" />
  <text x="264" y="96" class="note">Solicitó</text>

  <path class="arrow" d="M320 184 L320 160" />
