  <path class="arrow" d="M160 260 L360 200" />
  <text x="190" y="238" class="note">Exportar / Imprimir</text>

  <!-- Notes -->
  <rect x="560" y="40" width="600" height="120" fill="#eef2ff" stroke="#3730a3" rx="6" />
  <text x="576" y="64" class="label">Notas:</text>
  <text x="576" y="88" class="note">- `Azure Image Intelligence` valida calidad y OCR en los adjuntos.</text>
  <text x="576" y="110" class="note">- Aprobación final: decisión de `Sistemas` + `Calidad`. Imagen de firma opcional.</text>

