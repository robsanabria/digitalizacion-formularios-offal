  </g>

  <!-- Arrows: Actors -> Use cases / DB relations -->
  <!-- Solicitante/Calidad -> Crear solicitud (Solicitudes) -->
  <path class="arrow" d="M200 84 L260 100 L320 120" />

  <!-- Calidad/Sistemas -> Transición (Solicitudes) -->
  <path class="arrow" d="M200 140 L280 140 L320 152" />

  <!-- Sistemas -> Verifica (Solicitudes) -->
  <path class="arrow" d="M200 192 L280 200 L320 160" />

